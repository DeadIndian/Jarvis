name: Build and Release APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_FILE }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > release.jks

      - name: Build release APK
        env:
          KEYSTORE_FILE: ${{ github.workspace }}/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease

      - name: Rename APK to jarvis.apk
        run: mv app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/jarvis.apk

      - name: Delete existing release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ASSET_ID=$(gh api repos/$GITHUB_REPOSITORY/releases/tags/rolling-release | jq '.assets[] | select(.name=="jarvis.apk") | .id' 2>/dev/null || echo "")
          if [ -n "$ASSET_ID" ]; then
            gh api repos/$GITHUB_REPOSITORY/releases/assets/$ASSET_ID -X DELETE
          fi

      - name: Update rolling release
        uses: ncipollo/release-action@v1
        with:
          tag: rolling-release
          name: Jarvis Rolling Release
          body: |
            Latest build from main branch

            Download: **jarvis.apk**
          artifacts: app/build/outputs/apk/release/jarvis.apk
          allowUpdates: true
          makeLatest: true
          prerelease: false
